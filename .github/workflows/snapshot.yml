name: snapshot

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      - name: Run GoReleaser Snapshot
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --snapshot --clean

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wingman-snapshot
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          retention-days: 30

      - name: Publish snapshot prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -f snapshot "$GITHUB_SHA"
          git push -f origin refs/tags/snapshot

          if gh release view snapshot >/dev/null 2>&1; then
            gh release view snapshot --json assets --jq '.assets[].name' | while read -r asset; do
              gh release delete-asset snapshot "$asset" --yes
            done
            gh release edit snapshot \
              --title "Latest snapshot" \
              --notes "Automated snapshot build from ${GITHUB_SHA}." \
              --prerelease
          else
            gh release create snapshot \
              --title "Latest snapshot" \
              --notes "Automated snapshot build from ${GITHUB_SHA}." \
              --prerelease \
              --latest=false
          fi

          gh release upload snapshot dist/*.tar.gz dist/*.zip dist/checksums.txt --clobber
