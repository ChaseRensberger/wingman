<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wingman Web UI Unavailable</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f1115;
        color: #f4f4f5;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      main {
        max-width: 40rem;
        padding: 2rem;
      }
      code {
        border-radius: 0.35rem;
        background: #1f2430;
        padding: 0.15rem 0.35rem;
      }

  <body>
    <main>
      <h1>Wingman Web UI is not bundled</h1>
      <p>This source build was compiled without <code>web/dist</code>. Run the web build and compile with <code>-tags webdist</code> to embed the production UI.</p>
    </main>
  </body>
</html>
